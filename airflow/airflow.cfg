# Airflow configuration for ETL pipeline
# Production-ready settings with proper pools, connections, and monitoring

[core]
# Basic configuration
dags_folder = /opt/airflow/dags
hostname_callable = airflow.utils.net.get_host_ip_address
default_timezone = UTC
executor = LocalExecutor
parallelism = 32
dag_concurrency = 16
dags_are_paused_at_creation = True
max_active_runs_per_dag = 1
load_examples = False
load_default_connections = False

# Logging
logging_level = INFO
fab_logging_level = WARN
logging_config_class = airflow.config_templates.airflow_local_settings

# Security
expose_config = False
unit_test_mode = False

[database]
# Using PostgreSQL for metadata
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow123@localhost:5432/airflow_db
sql_alchemy_pool_enabled = True
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_recycle = 1800

[webserver]
# Web server configuration
base_url = http://localhost:8080
default_ui_timezone = UTC
expose_hostname = True
expose_stacktrace = True
dag_default_view = graph
dag_orientation = LR
web_server_host = 0.0.0.0
web_server_port = 8080
web_server_worker_timeout = 120
worker_refresh_batch_size = 1
worker_refresh_interval = 30
secret_key = your_secret_key_here
session_lifetime_minutes = 43200

[email]
# Email configuration for alerts
email_backend = airflow.utils.email.send_email_smtp

[smtp]
# SMTP settings for email notifications
smtp_host = smtp.company.com
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
smtp_mail_from = airflow@company.com
smtp_user = airflow@company.com
smtp_password = smtp_password_here

[celery]
# Celery configuration (if using CeleryExecutor)
broker_url = redis://localhost:6379/0
result_backend = db+postgresql://airflow:airflow123@localhost:5432/airflow_db
worker_concurrency = 16

[scheduler]
# Scheduler configuration
job_heartbeat_sec = 5
scheduler_heartbeat_sec = 5
num_runs = -1
processor_poll_interval = 1
min_file_process_interval = 0
dag_dir_list_interval = 300
print_stats_interval = 30
child_process_log_directory = /opt/airflow/logs/scheduler
scheduler_zombie_task_threshold = 300
catchup_by_default = False
max_threads = 2
parsing_processes = 2

[logging]
# Logging configuration
base_log_folder = /opt/airflow/logs
remote_logging = False
logging_level = INFO
fab_logging_level = WARN
log_filename_template = {{ ti.dag_id }}/{{ ti.task_id }}/{{ ts }}/{{ try_number }}.log
log_processor_filename_template = {{ filename }}.log
dag_processor_manager_log_location = /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log

[metrics]
# Metrics configuration
statsd_on = False
statsd_host = localhost
statsd_port = 8125
statsd_prefix = airflow

[lineage]
# Lineage tracking
backend = airflow.lineage.backend.atlas

[atlas]
# Atlas lineage backend (if using)
sasl_enabled = False
host = localhost
port = 21000
username = admin
password = admin

[hive]
# Hive configuration
default_hive_mapred_queue = airflow
configuration_as_jinja2 = True

[kubernetes]
# Kubernetes configuration (if using KubernetesExecutor)
namespace = airflow
airflow_configmap = airflow-config
worker_container_repository = apache/airflow
worker_container_tag = 2.7.3
worker_container_image_pull_policy = IfNotPresent
delete_worker_pods = True
delete_worker_pods_on_failure = False

[secrets]
# Secrets backend configuration
backend = airflow.providers.hashicorp.secrets.vault.VaultBackend
backend_kwargs = {"connections_path": "connections", "variables_path": "variables", "mount_point": "airflow", "url": "http://127.0.0.1:8200"}

[cli]
# CLI configuration
api_client = airflow.api.client.json_client
endpoint_url = http://localhost:8080

[debug]
# Debug configuration
fail_fast = False

[api]
# API configuration
auth_backend = airflow.api.auth.backend.basic_auth
maximum_page_limit = 100

[operators]
# Operator configuration
default_owner = data-engineering
default_cpus = 1
default_ram = 512
default_disk = 512
default_gpus = 0

[webserver]
# Additional webserver settings
dag_default_view = graph
dag_orientation = LR
log_fetch_timeout_sec = 5
hide_paused_dags_by_default = False
page_size = 100

[email]
# Email template configuration
email_conn_id = smtp_default
default_email_on_retry = True
default_email_on_failure = True

[lineage]
# Data lineage settings
backend = 

