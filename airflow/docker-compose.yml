# E-commerce ETL Pipeline - Airflow Docker Compose
# Production-ready Airflow setup with PostgreSQL metadata DB, Redis, and separate data warehouse

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.7.3-python3.9
  environment:
    &airflow-common-env
    # Airflow Core Configuration
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_POSTGRES_PASSWORD:-airflow123}@postgres-airflow/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${AIRFLOW_POSTGRES_PASSWORD:-airflow123}@postgres-airflow/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-}
    
    # Airflow Connections Configuration
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${TIMEZONE:-UTC}
    AIRFLOW__CORE__PARALLELISM: ${AIRFLOW_PARALLELISM:-32}
    AIRFLOW__CORE__DAG_CONCURRENCY: ${AIRFLOW_DAG_CONCURRENCY:-16}
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: ${AIRFLOW_MAX_ACTIVE_RUNS:-16}
    
    # Custom environment variables
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    PYTHONPATH: '/opt/airflow/dags:/opt/airflow/plugins'
    
    # Data Warehouse PostgreSQL Connection
    DWH_POSTGRES_HOST: ${DWH_POSTGRES_HOST:-postgres-warehouse}
    DWH_POSTGRES_PORT: ${DWH_POSTGRES_PORT:-5432}
    DWH_POSTGRES_DB: ${DWH_POSTGRES_DB:-ecommerce}
    DWH_POSTGRES_USER: ${DWH_POSTGRES_USER:-ecommerce_user}
    DWH_POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD:-ecommerce123}
    DWH_POSTGRES_SCHEMA: ${DWH_POSTGRES_SCHEMA:-public}
    
    # Connection strings for easy access
    AIRFLOW_CONN_POSTGRES_DWH: postgresql://${DWH_POSTGRES_USER:-ecommerce_user}:${DWH_POSTGRES_PASSWORD:-ecommerce123}@${DWH_POSTGRES_HOST:-postgres-warehouse}:${DWH_POSTGRES_PORT:-5432}/${DWH_POSTGRES_DB:-ecommerce}
    AIRFLOW_CONN_REDIS_DEFAULT: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    
    # AWS credentials for S3 data lake
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    S3_BUCKET: ${S3_BUCKET:-ecommerce-data-lake}
    S3_PREFIX: ${S3_PREFIX:-data/}
    
    # Spark configuration
    SPARK_MASTER_URL: ${SPARK_MASTER_URL:-local[*]}
    SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
    SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
    
    # dbt configuration
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
    DBT_TARGET: ${DBT_TARGET:-dev}
    
    # Great Expectations configuration
    GE_HOME: /opt/airflow/great_expectations
    
    # Logging and monitoring
    AIRFLOW__LOGGING__LOGGING_LEVEL: ${LOG_LEVEL:-INFO}
    AIRFLOW__METRICS__STATSD_ON: ${ENABLE_STATSD:-False}
    AIRFLOW__METRICS__STATSD_HOST: ${STATSD_HOST:-}
    AIRFLOW__METRICS__STATSD_PORT: ${STATSD_PORT:-8125}
    
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - airflow-data:/opt/airflow/data
    - ../dbt:/opt/airflow/dbt
    - ../spark:/opt/airflow/spark
    - ../great_expectations:/opt/airflow/great_expectations
    - ../sql:/opt/airflow/sql
    - ../notebooks:/opt/airflow/notebooks
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres-airflow:
      condition: service_healthy
    postgres-warehouse:
      condition: service_healthy

services:
  # PostgreSQL database for Airflow metadata
  postgres-airflow:
    image: postgres:15-alpine
    container_name: airflow-postgres-metadata
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow123}
      POSTGRES_DB: airflow
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data/pgdata
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow", "-d", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-network

  # PostgreSQL database for data warehouse
  postgres-warehouse:
    image: postgres:15-alpine
    container_name: ecommerce-data-warehouse
    environment:
      POSTGRES_USER: ${DWH_POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${DWH_POSTGRES_PASSWORD:-ecommerce123}
      POSTGRES_DB: ${DWH_POSTGRES_DB:-ecommerce}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-warehouse-data:/var/lib/postgresql/data/pgdata
      - ../sql/schema_init.sql:/docker-entrypoint-initdb.d/01-schema_init.sql
      - ./warehouse-init:/docker-entrypoint-initdb.d/02-warehouse-setup
    ports:
      - "${DWH_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DWH_POSTGRES_USER:-ecommerce_user}", "-d", "${DWH_POSTGRES_DB:-ecommerce}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow-network

  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: airflow-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "
      if [ -n '${REDIS_PASSWORD:-}' ]; then
        redis-server --requirepass ${REDIS_PASSWORD}
      else
        redis-server
      fi"
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: >
        sh -c "
        if [ -n '${REDIS_PASSWORD:-}' ]; then
          redis-cli -a ${REDIS_PASSWORD} ping
        else
          redis-cli ping
        fi"
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - airflow-network

  # Airflow webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - airflow-network
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - airflow-network
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow worker (for CeleryExecutor)
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    scale: ${AIRFLOW_WORKER_REPLICAS:-1}
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
      C_FORCE_ROOT: "true"
    restart: always
    networks:
      - airflow-network
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow triggerer (for deferrable operators)
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - airflow-network
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow initialization
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    networks:
      - airflow-network
    command:
      - -c
      - |
        function ver() {
          printf "%04d%04d%04d%04d" $${1//./ }
        }
        airflow_version=$$(AIRFLOW__LOGGING__LOGGING_LEVEL=INFO && airflow version)
        airflow_version_comparable=$$(ver $${airflow_version})
        min_airflow_version=2.2.0
        min_airflow_version_comparable=$$(ver $${min_airflow_version})
        if (( airflow_version_comparable < min_airflow_version_comparable )); then
          echo
          echo -e "\033[1;31mERROR!!!: Too old Airflow version $${airflow_version}!\e[0m"
          echo "The minimum Airflow version supported: $${min_airflow_version}. Only use this or higher!"
          echo
          exit 1
        fi
        if [[ -z "$${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "$${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      HOME: /home/airflow
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  # Airflow CLI for management tasks
  airflow-cli:
    <<: *airflow-common
    container_name: airflow-cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    networks:
      - airflow-network

  # Flower for monitoring Celery workers
  flower:
    <<: *airflow-common
    container_name: airflow-flower
    command: celery flower
    profiles:
      - flower
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      <<: *airflow-common-env
      CELERY_FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:flower123}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - airflow-network
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce-pgadmin
    profiles:
      - admin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ecommerce.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: always
    networks:
      - airflow-network
    depends_on:
      - postgres-airflow
      - postgres-warehouse

volumes:
  # Airflow metadata database
  postgres-airflow-data:

  # Data warehouse database
  postgres-warehouse-data:

  # Redis data
  redis-data:

  # Airflow shared data
  airflow-data:

  # PgAdmin data
  pgadmin-data:

networks:
  airflow-network:
    driver: bridge
    name: ecommerce-etl-network
    ipam:
      config:
        - subnet: 172.20.0.0/16
