name: ecommerce_analytics
version: 1.0.0
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: ecommerce

# These configurations specify where dbt should look for different types of files.
model-paths:
  - models
analysis-paths:
  - analyses
test-paths:
  - tests
seed-paths:
  - seeds
macro-paths:
  - macros
snapshot-paths:
  - snapshots

# Directory which will store compiled SQL files
target-path: target

# Directories to be removed by `dbt clean`
clean-targets:
  - target
  - dbt_packages

# Configuring models
models:
  ecommerce_analytics:
    # All models in the models/ directory will be materialized as tables
    +materialized: table
    
    # Staging models - materialized as views for development speed
    staging:
      +materialized: view
      +docs:
        node_color: "lightblue"
    
    # Intermediate models - materialized as views
    intermediate:
      +materialized: view
      +docs:
        node_color: "orange"
    
    # Mart models - materialized as tables for performance
    marts:
      +materialized: table
      +docs:
        node_color: "green"
      
      # Core business logic
      core:
        +materialized: table
        +post-hook: "GRANT SELECT ON {{ this }} TO analytics_user"
      
      # Finance-specific models
      finance:
        +materialized: table
        +post-hook: "GRANT SELECT ON {{ this }} TO analytics_user"
      
      # Marketing-specific models
      marketing:
        +materialized: table
        +post-hook: "GRANT SELECT ON {{ this }} TO analytics_user"

# Configure snapshots
snapshots:
  ecommerce_analytics:
    +target_schema: snapshots
    +strategy: timestamp
    +unique_key: id

# Configure seeds
seeds:
  ecommerce_analytics:
    +schema: seeds
    +materialized: table

# Configure tests
tests:
  +severity: error

# Macros configuration
dispatch:
  - macro_namespace: dbt_utils
    search_order: ['dbt_utils']

# Variables
vars:
  # Date variables for incremental models
  start_date: '2024-01-01'
  
  # Timezone for date calculations
  timezone: 'UTC'
  
  # Data retention periods (in days)
  raw_data_retention_days: 90
  staging_data_retention_days: 180
  
  # Incremental model configurations
  incremental_strategy: 'merge'
  
  # Data quality thresholds
  min_row_count: 1
  max_duplicate_percentage: 5.0
  
  # Business logic configurations
  customer_lifetime_value_days: 365
  high_value_customer_threshold: 1000.00
  
  # Currency configurations
  base_currency: USD
  
# On-run hooks
on-run-start:
  - "{{ log('Starting dbt run for ecommerce analytics', info=True) }}"
  - create schema if not exists {{ target.schema }}_logs
  - >
    create table if not exists {{ target.schema }}_logs.dbt_run_log (
      run_id text,
      start_time timestamptz,
      end_time timestamptz,
      status text
    )

on-run-end:
  - "{{ log('Completed dbt run for ecommerce analytics', info=True) }}"
  - >
    insert into {{ target.schema }}_logs.dbt_run_log 
    (run_id, start_time, end_time, status) 
    values (
      '{{ invocation_id }}', 
      '{{ run_started_at }}', 
      current_timestamp, 
      'success'
    )

# Quoting configurations
quoting:
  database: false
  schema: false
  identifier: false

# Logging configuration
require-dbt-version: ">=1.6.0"
