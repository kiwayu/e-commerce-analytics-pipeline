version: 2

models:
  # ========================================
  # INTERMEDIATE LAYER
  # ========================================
  # Staging models are documented in models/staging/staging.yml;
  # core mart models in models/marts/core/core.yml.
  - name: int_customer_order_metrics
    description: >
      Customer-level order metrics and behavioral analysis.
      Aggregates order data to create customer insights and segmentation.
    meta:
      owner: analytics_team
      maturity: high
    tags:
      - intermediate
      - customers
      - metrics
      - daily

  - name: int_order_shipment_combined
    description: >
      Combined order and shipment data for complete fulfillment view.
      Links orders with their associated shipments and delivery performance.
    meta:
      owner: operations_team
      maturity: high
    tags:
      - intermediate
      - orders
      - shipments
      - daily

  # ========================================
  # MARTS LAYER - FINANCE
  # ========================================
  - name: revenue_daily
    description: >
      Daily revenue aggregations for financial reporting and analysis.
      Includes revenue by status, returns, and key business metrics.
    meta:
      owner: finance_team
      maturity: production
    tags:
      - finance
      - revenue
      - daily
      - reporting

  # ========================================
  # MARTS LAYER - MARKETING
  # ========================================
  - name: customer_segmentation
    description: >
      Customer segmentation analysis for marketing campaigns and targeting.
      Provides detailed customer segments with actionable marketing insights.
    meta:
      owner: marketing_team
      maturity: production
    tags:
      - marketing
      - segmentation
      - customers
      - weekly

# ========================================
# EXPOSURES
# ========================================
exposures:
  - name: finance_dashboard
    type: dashboard
    maturity: high
    url: https://company.looker.com/dashboards/finance
    description: >
      Executive finance dashboard showing daily revenue, 
      trends, and key financial metrics.
    depends_on:
      - ref('revenue_daily')
      - ref('fact_orders')
    owner:
      name: Finance Team
      email: finance@company.com

  - name: marketing_analytics
    type: dashboard  
    maturity: high
    url: https://company.looker.com/dashboards/marketing
    description: >
      Marketing analytics dashboard for customer segmentation,
      campaign performance, and customer lifetime value analysis.
    depends_on:
      - ref('customer_segmentation')
      - ref('dim_customers')
    owner:
      name: Marketing Team
      email: marketing@company.com

  - name: operations_monitoring
    type: dashboard
    maturity: medium
    url: https://company.looker.com/dashboards/operations  
    description: >
      Operations dashboard monitoring order fulfillment,
      shipping performance, and delivery metrics.
    depends_on:
      - ref('fact_orders')
      - ref('int_order_shipment_combined')
    owner:
      name: Operations Team
      email: ops@company.com
