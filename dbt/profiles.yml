ecommerce:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DWH_POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('DWH_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('DWH_POSTGRES_USER', 'ecommerce_user') }}"
      password: "{{ env_var('DWH_POSTGRES_PASSWORD', 'ecommerce123') }}"
      dbname: "{{ env_var('DWH_POSTGRES_DB', 'ecommerce') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0

    prod:
      type: postgres
      host: "{{ env_var('DWH_POSTGRES_HOST', 'postgres-warehouse') }}"
      port: "{{ env_var('DWH_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('DWH_POSTGRES_USER', 'ecommerce_user') }}"
      password: "{{ env_var('DWH_POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('DWH_POSTGRES_DB', 'ecommerce') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0
